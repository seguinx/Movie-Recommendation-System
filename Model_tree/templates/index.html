<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recommandation de films</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; padding: 30px; }
    .box { max-width: 900px; margin: auto; background: #111827; padding: 24px; border-radius: 16px; }
    input, button { padding: 12px; font-size: 16px; border-radius: 8px; }
    input { width: 220px; }
    button { background: #22c55e; border: none; font-weight: bold; cursor: pointer; }
    .movie { background: #1e293b; margin-top: 12px; padding: 12px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Mini API Flask - Recommandation de films</h1>
    <p>Entre un userId pour recevoir 10 films recommandés.</p>
    <input type="number" id="userId" placeholder="Ex: 1">
    <button onclick="loadRecommendations()">Recommander</button>
    <div id="results"></div>
  </div>

  <script>
    async function loadRecommendations() {
      const userId = document.getElementById('userId').value;
      const results = document.getElementById('results');
      results.innerHTML = '<p>Chargement...</p>';

      const response = await fetch(`/recommend/${userId}`);
      const data = await response.json();

      if (!response.ok) {
        results.innerHTML = `<p>${data.error}</p>`;
        return;
      }

      results.innerHTML = `<h2>10 recommandations pour user ${data.userId}</h2>` +
        data.recommendations.map(movie => `
          <div class="movie">
            <strong>${movie.title}</strong><br>
            Score: ${movie.like_proba.toFixed(3)}<br>
            Note moyenne: ${movie.movie_mean_rating.toFixed(2)}<br>
            Nombre de votes: ${movie.movie_rating_count}
          </div>
        `).join('');
    }
  </script>
</body>
</html>
